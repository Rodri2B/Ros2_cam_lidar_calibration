#Board configuration (dimentions in milimeters)

chessboard:
  pattern_size:
    height: 8
    width: 6  
  square_length: 65
  board_dimension:
    width: 650
    height: 910
  translation_error:
    x: 10
    y: 30


#Camera configuration
camera:
  distortion_model: "plumb_bob"
  image_size:
    width: 1400
    height: 1000

  #Camera Projection Matrix

  K: [1207.11,0.0,700.0,0.0,1207.11,500.0,0.0,0.0,1.0]

  #Distortion Coefficients
  D: [-0.170,0.041,-0.005,0.001,0.000]


#Lidar configuration
#offset in mm
lidar_offset: 0.0

feature_extraction:
  x_min: -10.0
  x_max: 10.0
  y_min: -0.95
  y_max: 10.0
  z_min: -10.0
  z_max: 10.0

#OpenGL coord system
cloud_coord_system:
  right: [1.0,0.0,0.0]
  up: [0.0,1.0,0.0]
  front: [0.0,0.0,-1.0]

